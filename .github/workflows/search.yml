name: Margeen search

# Two ways to start a search:
#   1. workflow_dispatch  — manually from GitHub UI (input field for the prompt)
#   2. repository_dispatch — POSTed from Shopify Flow when a draft product
#      tagged "margeen-search" is created (see docs/SETUP.md)
on:
  workflow_dispatch:
    inputs:
      prompt:
        description: "Product category or description (e.g. 'blue kids pants', 'wireless earbuds with case')"
        required: true
        type: string
  repository_dispatch:
    types: [margeen_search]

permissions:
  contents: write

# Serialize search runs. Two concurrent triggers (e.g. you click "Run
# workflow" while a previous one is still pushing) would race on the
# `git push` step. With cancel-in-progress: false they queue cleanly.
concurrency:
  group: margeen-search
  cancel-in-progress: false

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Resolve prompt
        id: prompt
        env:
          INPUT_PROMPT: ${{ inputs.prompt }}
          DISPATCH_PROMPT: ${{ github.event.client_payload.prompt }}
        run: |
          set -euo pipefail
          RAW="${INPUT_PROMPT:-${DISPATCH_PROMPT:-}}"
          PROMPT="$(printf '%s' "$RAW" | sed -E 's/^[[:space:]]+|[[:space:]]+$//g')"
          echo "received: '$RAW' (len=${#RAW})"
          echo "trimmed:  '$PROMPT' (len=${#PROMPT})"
          if [ -z "$PROMPT" ]; then
            echo "::error::No prompt supplied via workflow_dispatch input or repository_dispatch client_payload.prompt"
            exit 1
          fi
          {
            echo "value<<EOF"
            echo "$PROMPT"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run AliExpress search
        id: search
        env:
          PROMPT: ${{ steps.prompt.outputs.value }}
        run: |
          python scripts/search_aliexpress.py "$PROMPT"
          LATEST=$(ls -t candidates/*.json 2>/dev/null | grep -v latest.json | head -1)
          echo "latest_file=$LATEST" >> "$GITHUB_OUTPUT"
          echo "latest_basename=$(basename "$LATEST")" >> "$GITHUB_OUTPUT"

      - name: Upload result as artifact
        if: steps.search.outputs.latest_file != ''
        uses: actions/upload-artifact@v4
        with:
          name: search-result
          path: |
            ${{ steps.search.outputs.latest_file }}
            candidates/latest.json
          if-no-files-found: warn
          retention-days: 30

      - name: Write run summary
        if: steps.search.outputs.latest_file != ''
        env:
          PROMPT: ${{ steps.prompt.outputs.value }}
          LATEST_FILE: ${{ steps.search.outputs.latest_file }}
          LATEST_BASENAME: ${{ steps.search.outputs.latest_basename }}
        run: |
          REPO_URL="https://github.com/${{ github.repository }}"
          # Use the commit SHA that the workflow ran from for the timestamped
          # file (it lives in the commit-results push later). For latest.json
          # the same SHA also works.
          RESULT_URL="$REPO_URL/blob/main/$LATEST_FILE"
          LATEST_URL="$REPO_URL/blob/main/candidates/latest.json"
          COUNT=$(python -c "import json; d=json.load(open('$LATEST_FILE')); print(d['candidate_count'])")
          BLOCKED=$(python -c "import json; d=json.load(open('$LATEST_FILE')); print(d['blocked'])")
          {
            echo "## Margeen search — \`$PROMPT\`"
            echo ""
            echo "- **Candidates found:** $COUNT"
            echo "- **Blocked:** $BLOCKED"
            echo "- **Result file (this run):** [\`$LATEST_BASENAME\`]($RESULT_URL)"
            echo "- **Stable latest:** [\`candidates/latest.json\`]($LATEST_URL)"
            echo ""
            if [ "$COUNT" -gt 0 ]; then
              echo "### Top products"
              echo ""
              python - <<'PY'
import json, os
d = json.load(open(os.environ['LATEST_FILE']))
for c in d['candidates'][:5]:
    title = (c.get('title') or '').replace('|', '\\|').strip()[:120]
    print(f"- [{title}]({c['url']})")
PY
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit results
        env:
          PROMPT: ${{ steps.prompt.outputs.value }}
        run: |
          set -euo pipefail
          git config user.email "wiswes@users.noreply.github.com"
          git config user.name "wiswes"
          git add -A candidates/
          if git diff --staged --quiet; then
            echo "No new candidate files to commit."
            exit 0
          fi
          git commit -m "search: $PROMPT"
          # Retry push with rebase if a concurrent / re-run job pushed
          # first. `-X theirs` means "keep our just-built commit on
          # conflict" — only latest.json could realistically clash, and
          # our run is the more recent search so its latest.json wins.
          for attempt in 1 2 3; do
            if git push; then
              echo "push ok on attempt $attempt"
              exit 0
            fi
            echo "push rejected on attempt $attempt — rebasing on origin/main"
            git fetch origin main
            git rebase -X theirs origin/main || {
              echo "::error::rebase failed; aborting"
              git rebase --abort || true
              exit 1
            }
          done
          echo "::error::push still failing after 3 attempts"
          exit 1
